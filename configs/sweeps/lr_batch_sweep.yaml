# Sweep: Learning rate, batch size, and training hyperparameters
# Bayesian optimization minimizing training loss
#
# Usage:
#   python -m open_value_estimator.sweep \
#       config=configs/config.yaml \
#       sweep_config=configs/sweeps/lr_batch_sweep.yaml \
#       count=30

method: bayes
metric:
  name: loss
  goal: minimize

parameters:
  training.learning_rate:
    distribution: log_uniform_values
    min: 1e-6
    max: 1e-3

  training.weight_decay:
    values: [0.0, 0.01, 0.05, 0.1]

  data.batch_size:
    values: [16, 32, 48, 64]

  training.warmup_steps:
    values: [200, 500, 1000, 2000]

  model.value_head_depth:
    values: [1, 2, 3]

  training.adam_beta2:
    values: [0.95, 0.99, 0.999]

early_terminate:
  type: hyperband
  min_iter: 500
  eta: 3
  s: 2
